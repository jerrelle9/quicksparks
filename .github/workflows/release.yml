name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npx biome check .

      - run: npx gulp bundle --ship
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - run: npx gulp package-solution --ship

      - run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: generate changelog
        id: changelog
        run: |
          changelog=$(git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s" --no-merges)
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changelog" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: sharepoint/solution/*.sppkg
